<head>
  <meta charset="utf-8">

  <link rel="icon" href="data:,">
  <title>ROBLOCK</title>
  <meta name="viewport"
        content="width=device-width,user-scalable=no,initial-scale=1,minimum-scale=1,maximum-scale=1,viewport-fit=cover,minimal-ui=true"/>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <meta name="renderer" content="webkit"/>
  <meta name="force-rendering" content="webkit"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
  <meta name="msapplication-tap-highlight" content="no">
  <meta name="full-screen" content="yes"/>
  <meta name="x5-fullscreen" content="true"/>
  <meta name="360-fullscreen" content="true"/>
  <meta name="x5-page-mode" content="app">
  <style>
    html{width:100%;height:100%;margin:0;background:#f5c45e;overflow:hidden}
    body{position:fixed;inset:0;width:100%;height:100dvh;margin:0;background:#f5c45e;overflow:hidden}
    #roblock-boot{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#f8d276 0%,#efaf43 100%);color:#2d203d;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;transition:opacity .22s ease}
    #roblock-boot.is-hidden{opacity:0;pointer-events:none}
  </style>
  <link rel="stylesheet" type="text/css" href="style.01ebe.css"/>
</head>
<body>
  <script>
    (function () {
      var token = new URLSearchParams(location.search).get('fresh');
      var marker = 'roblock.shareFreshToken';
      if (!token || localStorage.getItem(marker) === token) return;
      var staleKeys = [];
      for (var index = 0; index < localStorage.length; index += 1) {
        var key = localStorage.key(index);
        if (key && key.indexOf('roblock.') === 0) staleKeys.push(key);
      }
      staleKeys.forEach(function (key) { localStorage.removeItem(key); });
      localStorage.setItem(marker, token);
    }());
  </script>
  <div id="roblock-boot" role="status" aria-live="polite">
    <div class="roblock-boot-card">
      <div class="roblock-boot-logo">ROBLOCK</div>
      <div class="roblock-boot-blocks" aria-hidden="true">
        <i></i><i></i><i></i><i></i>
      </div>
      <div class="roblock-boot-copy">正在装配战场…</div>
    </div>
  </div>
  <div id="GameDiv" cc_exact_fit_screen="true">
    <div id="Cocos3dGameContainer">
      <canvas id="GameCanvas" oncontextmenu="event.preventDefault()" tabindex="99"></canvas>
    </div>
  </div>
  

<!-- Polyfills bundle. -->

<script src="src/polyfills.bundle.5adbf.js" charset="utf-8"> </script>

</script>

</body>
</html>
